<!doctype html>
<!--
  DEV PREVIEW ONLY. Mirrors sections/collection-story.liquid inside the page chrome, to verify the
  self-themed Gym (#gym) and Swim (#swim) pages. Change the hash and reload to switch collection.
  Reuses the REAL assets/base.css; images are local placeholders.
-->
<html lang="en" class="js">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Te Amo — collection page (preview)</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Space+Grotesk:wght@300..700&display=swap">
  <link rel="stylesheet" href="../assets/base.css">
</head>
<body>
  <div class="announcement"><div class="container"><span>Complimentary shipping on all made-to-order pieces — worldwide.</span><a class="link-underline" href="#">Meet Melina — AI model</a></div></div>
  <header class="header" data-header>
    <div class="header__left"><button class="header__icon" aria-label="Menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 7h16"/><path d="M4 12h16"/><path d="M4 17h16"/></svg></button></div>
    <div class="header__brand"><a href="#"><span class="wordmark">Te Amo</span></a></div>
    <div class="header__actions"><button class="header__icon" aria-label="Cart"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 8h12l-1 12H7L6 8Z"/><path d="M9 8V6.5a3 3 0 0 1 6 0V8" stroke-linecap="round"/></svg></button></div>
  </header>

  <main id="app"></main>

  <footer class="footer"><div class="container"><div class="footer__grid">
    <div class="footer__brand"><span class="wordmark">Te Amo</span><p class="muted" style="margin-top:1rem;max-width:30ch">Clothing made to order, and made to be loved.</p></div>
    <div class="footer__col"><h4>Atelier</h4><a href="#" class="link-underline">Gym</a><a href="#" class="link-underline">Swimwear</a></div>
    <div class="footer__disclosure"><span>Melina Jones Voss is an AI model. Every image of her is generated, disclosed, and made with love.</span><span>© 2026 Te Amo</span></div>
  </div></div></footer>

  <script>
    var PH = '../assets/ph-figure.svg';
    var DATA = {
      gym: {
        cls: 'template-page template-page-gym-wear',
        eyebrow: 'The Gym Edit', heading: 'Made to move with you.',
        sub: 'Second-skin activewear with real hold — sculpted seams, matte power fabric, cut to order in red and black. Worn by Melina, made for you.',
        statement: "Strength isn't loud. It holds. Every piece is cut to order in your size — made for the body you train in, not a sample rack.",
        mto: 'Made to order in 2–3 weeks. Nothing sits in a warehouse; your set is cut when you order it, in red and black.',
        stats: [['2–3 wks','Made to order'],['0','Waste'],['100%','Your size'],['1','Melina']],
        looks: [['The Forge Legging','Activewear'],['The Power Sports Bra','Activewear'],['The Strength Tank','Activewear'],['The Iron Training Short','Activewear'],['The Pulse Crop','Activewear'],['The Anchor Jogger','Activewear']]
      },
      swim: {
        cls: 'template-page template-page-swimwear',
        eyebrow: 'The Swim Edit', heading: 'Sun-ready, made to order.',
        sub: 'Cut for open water and long afternoons — sunfast azure and sunflower yellow, shapes that stay put when you dive. Worn by Melina, made for you.',
        statement: 'Made for the water and the long walk back. Cut to order in your size, so it stays put the way you actually swim.',
        mto: 'Made to order in 2–3 weeks. Cut when you order — sunfast colour, no overstock, no waste.',
        stats: [['2–3 wks','Made to order'],['0','Waste'],['100%','Your size'],['1','Melina']],
        looks: [['The Riviera One-Piece','Swimwear'],['The Solstice Bikini','Swimwear'],['The Lido Wrap','Cover-up'],['The Cove Maillot','Swimwear'],['The Marina Board Short','Swimwear'],['The Noon Rashguard','Swimwear']]
      }
    };
    var key = (location.hash.replace('#','') === 'swim') ? 'swim' : 'gym';
    var d = DATA[key];
    document.body.className = d.cls;
    document.getElementById('app').innerHTML =
      '<div class="cstory">' +
        '<section class="cstory-hero"><div class="cstory-hero__media"><img src="'+PH+'" alt=""></div>' +
          '<div class="cstory-hero__body"><p class="eyebrow cstory-eyebrow">'+d.eyebrow+'</p>' +
          '<h1 class="cstory-hero__title display">'+d.heading+'</h1>' +
          '<p class="lede cstory-hero__sub">'+d.sub+'</p>' +
          '<div class="cstory-hero__cta"><a class="btn" href="#" style="--btn-bg:var(--accent);--btn-fg:#fff">Shop the collection</a><a class="btn btn--ghost" href="#cs-looks">See the looks</a></div>' +
        '</div></section>' +
        '<section class="section--tight"><div class="container"><div class="cstory-ethos">' +
          d.stats.map(function(s){return '<div class="cstory-stat"><span class="cstory-stat__num">'+s[0]+'</span><span class="cstory-stat__label">'+s[1]+'</span></div>';}).join('') +
        '</div></div></section>' +
        '<section class="section" id="cs-looks"><div class="container"><div class="collection-head"><div><p class="eyebrow">The looks</p><h2 class="h-md" style="margin-top:.5rem">'+(key==='gym'?'The gym edit':'The swim edit')+'</h2></div><a href="#" class="link-underline">Shop all →</a></div>' +
          '<div class="cstory-looks">' + d.looks.map(function(l){return '<a class="cstory-look" href="#"><img src="'+PH+'" alt=""><span class="cstory-look__cap"><span>'+l[0]+'</span><span>'+l[1]+'</span></span></a>';}).join('') + '</div>' +
        '</div></section>' +
        '<section class="section cstory-statement"><div class="container"><p>'+d.statement+'</p></div></section>' +
        '<section class="section"><div class="container"><div class="editorial-split"><div class="editorial-split__media"><img src="'+PH+'" alt=""></div><div class="editorial-split__media"><img src="'+PH+'" alt=""></div></div></div></section>' +
        '<section class="section cstory-mto"><div class="container"><p class="eyebrow">Made to order</p><p class="lede">'+d.mto+'</p><a class="btn" href="#" style="--btn-bg:var(--accent);--btn-fg:#fff">Shop the collection</a></div></section>' +
        '<footer class="cstory-footer container"><span class="muted" style="max-width:52ch">Melina Jones Voss is an AI model. Every image of her is generated and openly disclosed.</span><a href="#" class="link-underline">← Back to the store</a></footer>' +
      '</div>';
  </script>
</body>
</html>
