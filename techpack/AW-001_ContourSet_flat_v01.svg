<line x1="60" y1="1044" x2="1500" y2="1044" stroke="#ddd" stroke-width="1"/>
<text x="60" y="1066" class="warn">CATEGORY NOTE — Activewear is a different supply chain to the tailoring (sheet 09): coverstitch / flatlock / bartack / elastic-feed machines, not lockstitch. Flatlock is a join method, named per seam in the key. Build a per-style workbook before quoting.</text>
<text x="60" y="1084" class="note">The set is one SKU (bra + legging). Seamless-knit routes may remove the side seam entirely — decide before pattern. Values on this sheet are intent, not a graded spec.</text>
