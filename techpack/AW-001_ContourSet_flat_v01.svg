<!-- ============ CALLOUT KEY (column 1) ============ -->
<text x="720" y="200" class="sec">CALLOUT KEY</text>
<line x1="720" y1="210" x2="990" y2="210" stroke="#ddd" stroke-width="1"/>
<g>
 <text x="720" y="235" class="klet">A</text><text x="742" y="235" class="ktit">High waistband — wide, bonded</text>
 <text x="742" y="250" class="ktxt">Smooth high-rise, no drawcord; coverstitched edge</text>

 <text x="720" y="279" class="klet">B</text><text x="742" y="279" class="ktit">Neckline — high, elastic bind</text>
 <text x="742" y="294" class="ktxt">High supportive round neckline; coverstitched binding</text>

 <text x="720" y="323" class="klet">C</text><text x="742" y="323" class="ktit">Racerback</text>
 <text x="742" y="338" class="ktxt">Converging straps to centre-back yoke; freedom of motion</text>

 <text x="720" y="367" class="klet">D</text><text x="742" y="367" class="ktit">Longline underband — elastic</text>
 <text x="742" y="382" class="ktxt">Wide power-elastic band, coverstitched; anchors the bra</text>

 <text x="720" y="411" class="klet">E</text><text x="742" y="411" class="ktit">Bust support seam + lining (flatlock)</text>
 <text x="742" y="426" class="ktxt">Flatlock principal seam; front power-mesh lining / pad pocket</text>

 <text x="720" y="455" class="klet">F</text><text x="742" y="455" class="ktit">Armhole — elastic bind</text>
 <text x="742" y="470" class="ktxt">Clean-finish binding, coverstitched</text>

 <text x="720" y="499" class="klet">G</text><text x="742" y="499" class="ktit">Contour / sculpt seam — flatlock</text>
 <text x="742" y="514" class="ktxt">Curved panel seams follow the leg line; chafe-free flatlock</text>

 <text x="720" y="543" class="klet">H</text><text x="742" y="543" class="ktit">Side — seamless / flatlock</text>
 <text x="742" y="558" class="ktxt">Compression knit; confirm seamless vs flatlock side seam</text>

 <text x="720" y="587" class="klet">I</text><text x="742" y="587" class="ktit">Gusset — bartacked (4 corners)</text>
 <text x="742" y="602" class="ktxt">Diamond gusset for range + durability; bartack corners</text>

 <text x="720" y="631" class="klet">J</text><text x="742" y="631" class="ktit">Inseam — flatlock</text>
 <text x="742" y="646" class="ktxt">Inner-leg seam, chafe-free flatlock; 4-way stretch</text>

 <text x="720" y="675" class="klet">K</text><text x="742" y="675" class="ktit">Back rise / CB — sculpt seam</text>
 <text x="742" y="690" class="ktxt">Curved centre-back + booty-lift seam (flatlock)</text>

 <text x="720" y="719" class="klet">L</text><text x="742" y="719" class="ktit">Ankle hem — coverstitch</text>
 <text x="742" y="734" class="ktxt">Twin-needle coverstitch; opaque, recovers flat</text>
</g>

