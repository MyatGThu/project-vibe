<!-- ============ CALLOUT KEY (column 1) ============ -->
<text x="912" y="150" class="sec">CALLOUT KEY</text>
<line x1="912" y1="160" x2="1180" y2="160" stroke="#ddd" stroke-width="1"/>
<g>
 <text x="912" y="184" class="klet">A</text><text x="934" y="184" class="ktit">Waistband — 4 cm (POM 11)</text>
 <text x="934" y="198" class="ktxt">Concealed hook &amp; bar + interior button (Con 7)</text>

 <text x="912" y="225" class="klet">B</text><text x="934" y="225" class="ktit">Fly — left-over-right</text>
 <text x="934" y="239" class="ktxt">J-stitch 6 mm, bartack base · fly 15 cm (POM 12)</text>

 <text x="912" y="266" class="klet">C</text><text x="934" y="266" class="ktit">Slant front pocket</text>
 <text x="934" y="280" class="ktxt">Cotton bag, understitched, bartack ends (Con 5)</text>

 <text x="912" y="307" class="klet">D</text><text x="934" y="307" class="ktit">Pressed front crease</text>
 <text x="934" y="321" class="ktxt">Set sharp; use press cloth — wool shines (Con 11)</text>

 <text x="912" y="348" class="klet">E</text><text x="934" y="348" class="ktit">Side seam — pressed OPEN</text>
 <text x="934" y="362" class="ktxt">Plain seam, edges overlocked separately (Con 2)</text>

 <text x="912" y="389" class="klet">F</text><text x="934" y="389" class="ktit">Inseam — pressed open</text>
 <text x="934" y="403" class="ktxt">Plain seam, edges overlocked · 1.0 cm SA (Con 3)</text>

 <text x="912" y="430" class="klet">G</text><text x="934" y="430" class="ktit">Blind hem — 4 cm allowance</text>
 <text x="934" y="444" class="ktxt">Must not show on face; hand finish (Con 9)</text>

 <text x="912" y="471" class="klet">H</text><text x="934" y="471" class="ktit">Waistband curtain + labels (CB)</text>
 <text x="934" y="485" class="ktxt">Woven brand + size label, inside WB (BOM 9/10)</text>

 <text x="912" y="512" class="klet">I</text><text x="934" y="512" class="ktit">Centre-back seam</text>
 <text x="934" y="526" class="ktxt">Double-stitched; 1.5 cm SA, do NOT trim (Con 4)</text>

 <text x="912" y="553" class="klet">J</text><text x="934" y="553" class="ktit">No back pockets</text>
 <text x="934" y="567" class="ktxt">Clean back by design intent (sheet 01)</text>

 <text x="912" y="594" class="klet">K</text><text x="934" y="594" class="ktit">Back waist darts — 2 per side</text>
 <text x="934" y="608" class="ktxt">Take the waist→hip drop; front clean, no pleats</text>
</g>

<!-- ============ LINE KEY + MEASURES + FABRIC (column 2) ============ -->
<text x="1240" y="150" class="sec">LINE KEY</text>
<line x1="1240" y1="160" x2="1440" y2="160" stroke="#ddd" stroke-width="1"/>
<line x1="1240" y1="180" x2="1276" y2="180" class="edge"/><text x="1286" y="184" class="lval">cut edge / seam</text>
<line x1="1240" y1="200" x2="1276" y2="200" class="stitch"/><text x="1286" y="204" class="lval">topstitch line</text>
<line x1="1240" y1="220" x2="1276" y2="220" class="crease"/><text x="1286" y="224" class="lval">pressed crease / fold</text>
<line x1="1240" y1="240" x2="1276" y2="240" class="hem"/><text x="1286" y="244" class="lval">hem fold</text>
<rect class="bar" x="1240" y="256" width="10" height="4"/><text x="1286" y="264" class="lval">bartack</text>

<text x="1240" y="300" class="sec">KEY MEASURES</text>
<text x="1240" y="316" class="ktxt">size S · cm · ½ unless noted</text>
<line x1="1240" y1="326" x2="1440" y2="326" stroke="#ddd" stroke-width="1"/>
<g>
 <text x="1240" y="346" class="mkey">Waist relaxed</text><text x="1440" y="346" text-anchor="end" class="mval">34.0</text>
 <text x="1240" y="364" class="mkey">High hip</text><text x="1440" y="364" text-anchor="end" class="mval">42.0</text>
 <text x="1240" y="382" class="mkey">Hip</text><text x="1440" y="382" text-anchor="end" class="mval">48.8</text>
 <text x="1240" y="400" class="mkey">Front rise</text><text x="1440" y="400" text-anchor="end" class="mval">27.1</text>
 <text x="1240" y="418" class="mkey">Back rise</text><text x="1440" y="418" text-anchor="end" class="mval">36.6</text>
 <text x="1240" y="436" class="mkey">Thigh</text><text x="1440" y="436" text-anchor="end" class="mval">29.8</text>
 <text x="1240" y="454" class="mkey">Knee ▲</text><text x="1440" y="454" text-anchor="end" class="mrev">26.5</text>
 <text x="1240" y="472" class="mkey">Leg opening ▲</text><text x="1440" y="472" text-anchor="end" class="mrev">28.0</text>
 <text x="1240" y="490" class="mkey">Inseam (full)</text><text x="1440" y="490" text-anchor="end" class="mval">78.0</text>
 <text x="1240" y="508" class="mkey">Outseam (full)</text><text x="1440" y="508" text-anchor="end" class="mval">105.1</text>
 <text x="1240" y="526" class="mkey">Waistband height</text><text x="1440" y="526" text-anchor="end" class="mval">4.0</text>
 <text x="1240" y="544" class="mkey">Fly length</text><text x="1440" y="544" text-anchor="end" class="mval">15.0</text>
</g>
<text x="1240" y="564" class="mrev">▲ wide-leg target (supersedes v01 taper)</text>

<text x="1240" y="602" class="sec">FABRIC / COLOUR</text>
<line x1="1240" y1="612" x2="1440" y2="612" stroke="#ddd" stroke-width="1"/>
<text x="1240" y="632" class="note">Wool-blend suiting, matte, mech. stretch</text>
<text x="1240" y="648" class="note">62/34/4 Wool/Poly/Elastane · 250–270 gsm</text>
<text x="1240" y="664" class="note">Obsidian — Pantone 19-4007 TCX, no sheen</text>
<text x="1240" y="680" class="note">Pocketing: Bone (contrast, deliberate)</text>

<text x="1240" y="720" class="sec">NOTES</text>
<line x1="1240" y1="730" x2="1440" y2="730" stroke="#ddd" stroke-width="1"/>
<text x="1240" y="750" class="note">Back darts (2 per side) take the</text>
<text x="1240" y="766" class="note">waist→hip drop; front clean (no pleats).</text>
<text x="1240" y="786" class="note">Belt: showcase styles a leather belt, but</text>
<text x="1240" y="802" class="note">waistband is concealed hook &amp; bar, no</text>
<text x="1240" y="818" class="note">loops by intent — confirm loops vs none.</text>
<text x="1240" y="838" class="note">Grade &amp; true proportions live in the</text>
<text x="1240" y="854" class="note">workbook (03 POM, 04 CONSTRUCTION).</text>

