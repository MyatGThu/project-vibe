<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1000" font-family="Helvetica Neue, Arial, sans-serif">
<style>
 .edge{fill:#fff;stroke:#161616;stroke-width:2.1;stroke-linejoin:round;stroke-linecap:round;}
 .seam{fill:none;stroke:#161616;stroke-width:1.3;}
 .seam2{fill:none;stroke:#161616;stroke-width:1;}
 .stitch{fill:none;stroke:#161616;stroke-width:1;stroke-dasharray:5 3;}
 .crease{fill:none;stroke:#9a9a9a;stroke-width:1;stroke-dasharray:9 3 2 3;}
 .hem{fill:none;stroke:#a6a6a6;stroke-width:1;stroke-dasharray:3 3;}
 .bar{fill:#161616;}
 .lead{stroke:#b23a3a;stroke-width:0.9;fill:none;}
 .mrk{fill:#161616;stroke:#fcfbf9;stroke-width:1.3;}
 .mlet{fill:#fff;font-size:11px;font-weight:700;text-anchor:middle;}
 .cap{fill:#555;font-size:12px;letter-spacing:.18em;}
 .h1{fill:#111;font-size:22px;font-weight:600;}
 .sub{fill:#666;font-size:12px;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .sec{fill:#111;font-size:12px;font-weight:700;letter-spacing:.06em;}
 .klet{fill:#b23a3a;font-size:11px;font-weight:700;}
 .ktit{fill:#111;font-size:11px;font-weight:600;}
 .ktxt{fill:#555;font-size:10px;}
 .mkey{fill:#111;font-size:10.5px;font-weight:600;} .mval{fill:#333;font-size:10.5px;}
 .mrev{fill:#b23a3a;font-size:10.5px;font-weight:600;}
 .lval{fill:#333;font-size:10.5px;}
</style>
<rect x="0" y="0" width="1480" height="1000" fill="#fcfbf9"/>

<!-- ============ HEADER ============ -->
<text x="60" y="48" class="h1">THE OBSIDIAN TROUSER — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style TR-001 · Autumn Capsule 01 · Womenswear high-waist WIDE-LEG · Base size S · Colourway Obsidian · Flat v02</text>
<line x1="60" y1="86" x2="1420" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — not to scale, not graded. Communicates design intent + construction from sheets 01/03/04. A patternmaker must validate &amp; grade before pattern cutting (sheet 08).</text>

