<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1020" font-family="Helvetica Neue, Arial, sans-serif">
<style>
 .edge{fill:#fff;stroke:#161616;stroke-width:2.1;stroke-linejoin:round;}
 .seam{fill:none;stroke:#161616;stroke-width:1.3;}
 .stitch{fill:none;stroke:#161616;stroke-width:1;stroke-dasharray:5 3;}
 .crease{fill:none;stroke:#9a9a9a;stroke-width:1;stroke-dasharray:9 3 2 3;}
 .hem{fill:none;stroke:#a6a6a6;stroke-width:1;stroke-dasharray:3 3;}
 .lead{stroke:#b23a3a;stroke-width:0.9;fill:none;}
 .dot{fill:#b23a3a;} .bar{fill:#161616;}
 .t{fill:#1f1f1f;font-size:11px;} .tb{fill:#111;font-size:11px;font-weight:600;}
 .cap{fill:#555;font-size:12px;letter-spacing:.18em;}
 .h1{fill:#111;font-size:22px;font-weight:600;} .sub{fill:#666;font-size:12px;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .mkey{fill:#111;font-size:10.5px;font-weight:600;} .mval{fill:#333;font-size:10.5px;}
</style>
<rect x="0" y="0" width="1400" height="1020" fill="#fcfbf9"/>
<text x="60" y="48" class="h1">THE OBSIDIAN TROUSER — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style TR-001 · Autumn Capsule 01 · Womenswear high-waist WIDE-LEG · Base size S · Colourway Obsidian · Flat v02</text>
<line x1="60" y1="86" x2="1340" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — not to scale, not graded. Proportion + detail intent for quote/proto only. A patternmaker must validate &amp; grade before pattern cutting (workbook sheet 08).</text>

<!-- ============ FRONT ============ -->
<g>
<path class="edge" d="M 262 150 L 418 150 C 432 175, 441 220, 440 272 L 436 740 L 350 740 L 340 362 L 330 740 L 244 740 L 240 272 C 239 220, 248 175, 262 150 Z"/>
<!-- waistband seam -->
<path class="seam" d="M 244 184 L 436 184"/>
<!-- belt loops (5) straddling waistband -->
<rect class="edge" x="265" y="147" width="7" height="41"/>
<rect class="edge" x="305" y="147" width="7" height="41"/>
<rect class="edge" x="336" y="147" width="7" height="41"/>
<rect class="edge" x="372" y="147" width="7" height="41"/>
<rect class="edge" x="412" y="147" width="7" height="41"/>
<!-- fly: left-over-right J-stitch -->
<path class="stitch" d="M 349 188 L 349 320 C 349 340, 336 344, 327 340"/>
<rect class="bar" x="323" y="337" width="7" height="3"/>
<!-- slant front pockets -->
<path class="seam" d="M 268 196 L 306 258"/>
<path class="seam" d="M 412 196 L 374 258"/>
<rect class="bar" x="265" y="194.5" width="6" height="3"/>
<rect class="bar" x="303" y="256" width="6" height="3"/>
<rect class="bar" x="409" y="194.5" width="6" height="3"/>
<rect class="bar" x="371" y="256" width="6" height="3"/>
<!-- pressed leg creases -->
<path class="crease" d="M 288 292 L 288 730"/>
<path class="crease" d="M 392 292 L 392 730"/>
<!-- hem folds -->
<path class="hem" d="M 244 716 L 330 716"/>
<path class="hem" d="M 350 716 L 436 716"/>
<text x="340" y="774" text-anchor="middle" class="cap">FRONT</text>
</g>

<!-- ============ BACK ============ -->
<g>
<path class="edge" d="M 622 150 L 778 150 C 792 175, 801 220, 800 272 L 796 740 L 710 740 L 700 362 L 690 740 L 604 740 L 600 272 C 599 220, 608 175, 622 150 Z"/>
<path class="seam" d="M 604 184 L 796 184"/>
<!-- centre-back seam (let-out) -->
<path class="seam" d="M 700 152 L 700 362"/>
<path class="stitch" d="M 706 186 L 706 356"/>
<!-- back darts (2 each side of CB) -->
<path class="seam" d="M 662 186 L 666 214 L 670 186"/>
<path class="seam" d="M 738 186 L 734 214 L 730 186"/>
<!-- centre-back belt loop -->
<rect class="edge" x="696" y="147" width="7" height="41"/>
<rect class="edge" x="640" y="147" width="7" height="41"/>
<rect class="edge" x="753" y="147" width="7" height="41"/>
<!-- pressed creases -->
<path class="crease" d="M 648 292 L 648 730"/>
<path class="crease" d="M 752 292 L 752 730"/>
<!-- hem folds -->
<path class="hem" d="M 604 716 L 690 716"/>
<path class="hem" d="M 710 716 L 796 716"/>
<text x="700" y="774" text-anchor="middle" class="cap">BACK</text>
</g>

<!-- ============ FRONT CALLOUTS (left column) ============ -->
<path class="lead" d="M 336 167 L 222 158"/><circle class="dot" cx="336" cy="167" r="2.2"/>
<text x="215" y="150" text-anchor="end" class="tb">Waistband — 4 cm, curtained</text>
<text x="215" y="163" text-anchor="end" class="t">concealed hook &amp; bar + button;</text>
<text x="215" y="176" text-anchor="end" class="t">5 belt loops for the belt (POM 11)</text>

<path class="lead" d="M 288 240 L 222 244"/><circle class="dot" cx="288" cy="240" r="2.2"/>
<text x="215" y="240" text-anchor="end" class="tb">Slant front pocket</text>
<text x="215" y="253" text-anchor="end" class="t">understitched bag; bartacked (Con 5)</text>

<path class="lead" d="M 349 300 L 222 320"/><circle class="dot" cx="349" cy="300" r="2.2"/>
<text x="215" y="316" text-anchor="end" class="tb">Fly — left-over-right</text>
<text x="215" y="329" text-anchor="end" class="t">J-topstitch 6 mm, bartack at base;</text>
<text x="215" y="342" text-anchor="end" class="t">fly length 16 cm (POM 12)</text>

<path class="lead" d="M 288 470 L 222 452"/><circle class="dot" cx="288" cy="470" r="2.2"/>
<text x="215" y="448" text-anchor="end" class="tb">Pressed front crease</text>
<text x="215" y="461" text-anchor="end" class="t">centred, hard-pressed; no shine (Con 11)</text>

<path class="lead" d="M 262 700 L 222 604"/><circle class="dot" cx="262" cy="700" r="2.2"/>
<text x="215" y="600" text-anchor="end" class="tb">Wide-leg column</text>
<text x="215" y="613" text-anchor="end" class="t">hangs straight, full from hip;</text>
<text x="215" y="626" text-anchor="end" class="t">leg opening 27 cm ½ (POM 8)</text>

<path class="lead" d="M 300 716 L 222 690"/><circle class="dot" cx="300" cy="716" r="2.2"/>
<text x="215" y="686" text-anchor="end" class="tb">Blind hem, 5 cm allowance</text>
<text x="215" y="699" text-anchor="end" class="t">invisible on face; even break (Con 9)</text>

<!-- ============ BACK CALLOUTS (right column) ============ -->
<path class="lead" d="M 715 168 L 850 150"/><circle class="dot" cx="715" cy="168" r="2.2"/>
<text x="858" y="146" text-anchor="start" class="tb">Centre-back belt loop</text>
<text x="858" y="159" text-anchor="start" class="t">aligns to CB seam; matched height to fronts</text>

<path class="lead" d="M 700 250 L 850 236"/><circle class="dot" cx="700" cy="250" r="2.2"/>
<text x="858" y="224" text-anchor="start" class="tb">Centre-back seam</text>
<text x="858" y="237" text-anchor="start" class="t">double-stitched through curve;</text>
<text x="858" y="250" text-anchor="start" class="t">leave 1.5 cm SA for let-out — do NOT trim (Con 4)</text>

<path class="lead" d="M 736 205 L 850 320"/><circle class="dot" cx="736" cy="205" r="2.2"/>
<text x="858" y="316" text-anchor="start" class="tb">Two back waist darts / side</text>
<text x="858" y="329" text-anchor="start" class="t">shape seat to waist; pressed toward CB</text>

<path class="lead" d="M 770 360 L 850 404"/><circle class="dot" cx="770" cy="360" r="2.2"/>
<text x="858" y="400" text-anchor="start" class="tb">No back pockets</text>
<text x="858" y="413" text-anchor="start" class="t">clean seat — deliberate (design intent)</text>

<path class="lead" d="M 796 520 L 850 488"/><circle class="dot" cx="796" cy="520" r="2.2"/>
<text x="858" y="484" text-anchor="start" class="tb">Side seam pressed OPEN</text>
<text x="858" y="497" text-anchor="start" class="t">edges overlocked separately (Con 2)</text>

<!-- ============ LEGEND ============ -->
<text x="1140" y="150" class="mkey">LEGEND</text>
<line x1="1140" y1="168" x2="1174" y2="168" class="edge"/><text x="1184" y="172" class="mval">cut edge / seam</text>
<line x1="1140" y1="188" x2="1174" y2="188" class="stitch"/><text x="1184" y="192" class="mval">topstitch line</text>
<line x1="1140" y1="208" x2="1174" y2="208" class="crease"/><text x="1184" y="212" class="mval">pressed crease / fold</text>
<line x1="1140" y1="228" x2="1174" y2="228" class="hem"/><text x="1184" y="232" class="mval">hem fold</text>
<rect class="bar" x="1140" y="244" width="10" height="4"/><text x="1184" y="252" class="mval">bartack</text>

<!-- ============ KEY MEASURES ============ -->
<text x="1140" y="292" class="mkey">KEY MEASURES — size S (cm, ½ unless noted)</text>
<text x="1140" y="314" class="mkey">1 · Waist relaxed</text><text x="1368" y="314" text-anchor="end" class="mval">34.0</text>
<text x="1140" y="332" class="mkey">2 · High hip</text><text x="1368" y="332" text-anchor="end" class="mval">42.0</text>
<text x="1140" y="350" class="mkey">3 · Hip</text><text x="1368" y="350" text-anchor="end" class="mval">50.0</text>
<text x="1140" y="368" class="mkey">4 · Front rise</text><text x="1368" y="368" text-anchor="end" class="mval">27.5</text>
<text x="1140" y="386" class="mkey">5 · Back rise</text><text x="1368" y="386" text-anchor="end" class="mval">37.0</text>
<text x="1140" y="404" class="mkey">6 · Thigh</text><text x="1368" y="404" text-anchor="end" class="mval">32.0</text>
<text x="1140" y="422" class="mkey">7 · Knee</text><text x="1368" y="422" text-anchor="end" class="mval">28.0</text>
<text x="1140" y="440" class="mkey">8 · Leg opening</text><text x="1368" y="440" text-anchor="end" class="mval">27.0</text>
<text x="1140" y="458" class="mkey">9 · Inseam (full)</text><text x="1368" y="458" text-anchor="end" class="mval">76.0</text>
<text x="1140" y="476" class="mkey">10 · Outseam (full)</text><text x="1368" y="476" text-anchor="end" class="mval">106.0</text>
<text x="1140" y="494" class="mkey">11 · Waistband ht</text><text x="1368" y="494" text-anchor="end" class="mval">4.0</text>
<text x="1140" y="512" class="mkey">12 · Fly length</text><text x="1368" y="512" text-anchor="end" class="mval">16.0</text>

<!-- ============ FABRIC / COLOUR ============ -->
<text x="1140" y="552" class="mkey">FABRIC / COLOUR / TRIM</text>
<text x="1140" y="572" class="note">Shell: wool-blend suiting, matte, mech. stretch</text>
<text x="1140" y="588" class="note">62 / 34 / 4 Wool / Poly / Elastane · 250–270 gsm</text>
<text x="1140" y="604" class="note">Obsidian — Pantone 19-4007 TCX, no sheen</text>
<text x="1140" y="620" class="note">Pocketing: Bone cupro (contrast, deliberate)</text>
<text x="1140" y="636" class="note">Belt: slim leather, gunmetal buckle, 2.5 cm</text>
<text x="1140" y="652" class="note">Thread: tonal core-spun Tex 40</text>

<line x1="60" y1="900" x2="1340" y2="900" stroke="#ddd" stroke-width="1"/>
<text x="60" y="928" class="note">Belt loops CONFIRMED (v02): the leather belt is part of the look, so the waistband carries 5 loops — supersedes the "no loops" query on flat v01.</text>
<text x="60" y="947" class="note">Wide-leg silhouette per storefront ("moves like a skirt"): straight full leg from the hip, not tapered. Leg opening widened to 27 cm ½ vs. 19.8 on v01.</text>
<text x="60" y="966" class="note">Grade rules, seam allowances &amp; true proportions live in the workbook (sheet 03 POM, 04 CONSTRUCTION). This drawing is the visual key to them, not a substitute.</text>
</svg>
