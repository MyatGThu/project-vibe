<text x="1240" y="602" class="note">180–210 gsm + power-mesh lining</text>
<text x="1240" y="618" class="note">Ink — matte, no sheen</text>
<text x="1240" y="634" class="note">Elastic tension per seam (spec + log)</text>
<text x="1240" y="650" class="note">OPACITY-WHEN-WET test — mandatory</text>
