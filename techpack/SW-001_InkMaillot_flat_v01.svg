 .sub{fill:#666;font-size:12px;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .sec{fill:#111;font-size:12px;font-weight:700;letter-spacing:.06em;}
 .klet{fill:#b23a3a;font-size:11px;font-weight:700;}
 .ktit{fill:#111;font-size:11px;font-weight:600;}
 .ktxt{fill:#555;font-size:10px;}
 .mkey{fill:#111;font-size:10.5px;font-weight:600;}
 .lval{fill:#333;font-size:10.5px;}
</style>
