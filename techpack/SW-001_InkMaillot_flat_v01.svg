<line x1="60" y1="914" x2="1420" y2="914" stroke="#ddd" stroke-width="1"/>
<text x="60" y="936" class="warn">CATEGORY NOTE — Swim is a specialist supply chain (sheet 09): very few factories do it well. Elastic tension, wet opacity and chlorine resistance are the whole job — a render cannot specify them.</text>
<text x="60" y="954" class="note">No metal hardware on this style (integral straps) — so no corrosion risk here, but verify on any future clasp/ring variant. Values on this sheet are intent, not a graded spec.</text>
