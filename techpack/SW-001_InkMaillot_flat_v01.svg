 <text x="1240" y="352" class="mkey">Front neck drop (HPS)</text>
 <text x="1240" y="370" class="mkey">Back scoop drop (HPS)</text>
 <text x="1240" y="388" class="mkey">Strap length · shoulder</text>
 <text x="1240" y="406" class="mkey">Waist · high hip</text>
 <text x="1240" y="424" class="mkey">Leg-opening height (rise)</text>
 <text x="1240" y="442" class="mkey">Front / back rise</text>
 <text x="1240" y="460" class="mkey">Girth (HPS–gusset–HPS)</text>
 <text x="1240" y="478" class="mkey">Gusset width</text>
 <text x="1240" y="500" class="ktxt">Values TBD — measure relaxed AND</text>
 <text x="1240" y="515" class="ktxt">stretched; swim fit lives in stretch.</text>
</g>

