<!-- ============ CALLOUT KEY (column 1) ============ -->
<text x="912" y="150" class="sec">CALLOUT KEY</text>
<line x1="912" y1="160" x2="1180" y2="160" stroke="#ddd" stroke-width="1"/>
<g>
 <text x="912" y="185" class="klet">A</text><text x="934" y="185" class="ktit">Square plunge neckline</text>
 <text x="934" y="200" class="ktxt">Elastic-applied edge, coverstitched; clean square cut</text>

 <text x="912" y="229" class="klet">B</text><text x="934" y="229" class="ktit">Strap — continuous</text>
 <text x="934" y="244" class="ktxt">Elastic edge; set strap length ON body (swim stretches wet)</text>

 <text x="912" y="273" class="klet">C</text><text x="934" y="273" class="ktit">Bust princess support seam</text>
 <text x="934" y="288" class="ktxt">Shapes the cup; overlock + coverstitch topstitch</text>

 <text x="912" y="317" class="klet">D</text><text x="934" y="317" class="ktit">Fully lined — power mesh</text>
 <text x="934" y="332" class="ktxt">Front, back &amp; gusset lined; OPACITY-WHEN-WET test</text>

 <text x="912" y="361" class="klet">E</text><text x="934" y="361" class="ktit">High-cut leg opening</text>
 <text x="934" y="376" class="ktxt">Elastic-applied edge; tension per seam, spec &amp; log it</text>

 <text x="912" y="405" class="klet">F</text><text x="934" y="405" class="ktit">Gusset — lined, bartacked</text>
 <text x="934" y="420" class="ktxt">Hygiene gusset; bartack ends. Confirm single vs double</text>

 <text x="912" y="449" class="klet">G</text><text x="934" y="449" class="ktit">Open back — deep V</text>
 <text x="934" y="464" class="ktxt">Elastic-applied edge; sets how low the back sits</text>

 <text x="912" y="493" class="klet">H</text><text x="934" y="493" class="ktit">Centre-back seam</text>
 <text x="934" y="508" class="ktxt">Shapes seat; 3-thread overlock, coverstitch topstitch</text>

 <text x="912" y="537" class="klet">I</text><text x="934" y="537" class="ktit">Side seam — 3-thread overlock</text>
 <text x="934" y="552" class="ktxt">Stretch seam; no chafe hardware. Front-to-back register</text>

 <text x="912" y="581" class="klet">J</text><text x="934" y="581" class="ktit">Back leg opening — elastic</text>
 <text x="934" y="596" class="ktxt">Elastic-applied edge; balance with front leg tension</text>
</g>

