<text x="60" y="48" class="h1">THE INK MAILLOT — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style SW-001 · Swim / Collection 02 · High-leg one-piece · square plunge neck · open back · Base size S · Colourway Ink · Flat v01</text>
<line x1="60" y1="86" x2="1420" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — not to scale, not graded. Built from the showcase render + swim category requirements (sheet 09). Needs its own workbook (BOM / POM / construction) and a patternmaker's grade before sampling.</text>

