<line x1="60" y1="1170" x2="1500" y2="1170" stroke="#ddd" stroke-width="1"/>
<text x="60" y="1192" class="warn">CATEGORY NOTE — Seamless compression knit = a circular-knit / bonded supply chain (engineered-zone knitting, bonding, laser-cut edges), distinct from cut-and-sew activewear (which shows flatlock sculpt seams — see v01). Decide the route before pattern.</text>
<text x="60" y="1210" class="note">The set is one SKU (bra + legging). Shaping is knit-in — specs are size-S targets, not a graded spec. A patternmaker validates + grades before sampling.</text>
