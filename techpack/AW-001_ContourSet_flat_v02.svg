<line x1="60" y1="1044" x2="1500" y2="1044" stroke="#ddd" stroke-width="1"/>
<text x="60" y="1066" class="warn">CATEGORY NOTE — A seamless compression knit is a circular-knit / bonded supply chain (engineered-zone knitting, bonding, laser-cut edges), distinct from cut-and-sew activewear. Sampled cut-and-sew instead, it would carry visible flatlock sculpt seams (see v01) — a different look to the render. Decide the route before pattern.</text>
<text x="60" y="1084" class="note">The set is one SKU (bra + legging). Shaping is knit-in — values on this sheet are intent, not a graded spec.</text>
