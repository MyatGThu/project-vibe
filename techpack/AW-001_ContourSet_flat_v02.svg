 <path class="stitch" d="M 266 1034 L 306 1034"/>
 <text x="250" y="1088" text-anchor="middle" class="cap">LEGGING · FRONT</text>

 <!-- BACK: smooth, sculpt shaping knit-in (invisible) -->
 <path class="edge" d="M 411 648 L 559 648 C 571 664 575 722 573 772 L 555 1004 L 543 1052 L 503 1052 C 497 906 491 822 485 794 C 479 822 473 906 467 1052 L 427 1052 L 415 1004 L 397 772 C 395 722 399 664 411 648 Z"/>
 <rect class="band" x="397" y="648" width="176" height="40" rx="2"/>
 <path class="bind" d="M 401 686 L 569 686"/>
 <path class="stitch" d="M 429 1034 L 469 1034"/>
 <path class="stitch" d="M 501 1034 L 541 1034"/>
