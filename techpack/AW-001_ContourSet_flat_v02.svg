 <text x="742" y="294" class="ktxt">Scoop neckline between set-in shoulder straps; bonded / coverstitch bind</text>

 <text x="720" y="323" class="klet">C</text><text x="742" y="323" class="ktit">Back — clean (racer / scoop TBC)</text>
