<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1120" font-family="Helvetica Neue, Arial, sans-serif">
<style>
 .edge{fill:#fff;stroke:#161616;stroke-width:2.1;stroke-linejoin:round;stroke-linecap:round;}
 .seam{fill:none;stroke:#161616;stroke-width:1.3;}
 .stitch{fill:none;stroke:#161616;stroke-width:1;stroke-dasharray:5 3;}
 .bind{fill:none;stroke:#6f6f6f;stroke-width:1;stroke-dasharray:2 2.4;}
 .band{fill:#efece7;stroke:#161616;stroke-width:1.3;}
