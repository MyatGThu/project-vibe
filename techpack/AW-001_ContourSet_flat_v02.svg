<line x1="60" y1="1108" x2="1500" y2="1108" stroke="#ddd" stroke-width="1"/>
<text x="60" y="1130" class="warn">CATEGORY NOTE — Seamless compression knit = a circular-knit / bonded supply chain (engineered-zone knitting, bonding, laser-cut edges), distinct from cut-and-sew activewear (which shows flatlock sculpt seams — see v01). Decide the route before pattern.</text>
<text x="60" y="1148" class="note">The set is one SKU (bra + legging). Shaping is knit-in — values on this sheet are intent, not a graded spec.</text>
