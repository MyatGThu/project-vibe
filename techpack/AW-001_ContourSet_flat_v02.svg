<!-- ============ HEADER ============ -->
<text x="60" y="48" class="h1">THE CONTOUR SET — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style AW-001 · Gym / Collection 02 · Longline sports bra + high-waist sculpting legging · Base size S · Colourway Graphite · Flat v02 (seamless)</text>
<line x1="60" y1="86" x2="1500" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — drawn to the Contour Set's OWN render (openly disclosed): seamless compression knit, second-skin. Support &amp; sculpt shaping are KNIT-IN / bonded, not sewn flatlock panels. Needs a seamless-knit specialist, a workbook (BOM / POM / construction) and a patternmaker's grade before sampling.</text>

