<g>
 <text x="720" y="235" class="klet">A</text><text x="742" y="235" class="ktit">High waistband — knit-in</text>
 <text x="742" y="250" class="ktxt">Smooth high-rise, no drawcord; knit-in power band, bonded top edge</text>

 <text x="720" y="279" class="klet">B</text><text x="742" y="279" class="ktit">Neckline — bonded / elastic bind</text>
 <text x="742" y="294" class="ktxt">High supportive round neckline; bonded or coverstitched bind</text>

 <text x="720" y="323" class="klet">C</text><text x="742" y="323" class="ktit">Back — smooth (racer)</text>
 <text x="742" y="338" class="ktxt">Clean knit back, no panel seams; confirm racer vs scoop to render</text>

 <text x="720" y="367" class="klet">D</text><text x="742" y="367" class="ktit">Longline underband — knit-in</text>
 <text x="742" y="382" class="ktxt">Wide knit-in power band anchors the bra</text>

 <text x="720" y="411" class="klet">E</text><text x="742" y="411" class="ktit">Bust support — molded / bonded</text>
 <text x="742" y="426" class="ktxt">Molded or bonded underbust support (no sewn bust seam); optional pad pocket</text>

 <text x="720" y="455" class="klet">F</text><text x="742" y="455" class="ktit">Armhole — elastic bind</text>
 <text x="742" y="470" class="ktxt">Clean-finish bonded / coverstitch binding</text>

 <text x="720" y="499" class="klet">G</text><text x="742" y="499" class="ktit">Seamless body — no side seams</text>
 <text x="742" y="514" class="ktxt">Circular / engineered knit; compression + sculpt shaping knit-in, not sewn</text>

 <text x="720" y="543" class="klet">H</text><text x="742" y="543" class="ktit">Gusset — knit-in</text>
 <text x="742" y="558" class="ktxt">Knit-in or bonded diamond gusset for range; no bartacks on a seamless route</text>

 <text x="720" y="587" class="klet">I</text><text x="742" y="587" class="ktit">Ankle hem — clean</text>
 <text x="742" y="602" class="ktxt">Laser-cut raw edge or narrow coverstitch; opaque, recovers flat</text>
