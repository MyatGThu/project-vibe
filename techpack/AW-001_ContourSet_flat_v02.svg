<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 1180" font-family="Helvetica Neue, Arial, sans-serif">
<style>
 .edge{fill:#fff;stroke:#161616;stroke-width:2.1;stroke-linejoin:round;stroke-linecap:round;}
 .seam{fill:none;stroke:#161616;stroke-width:1.3;}
 .stitch{fill:none;stroke:#161616;stroke-width:1;stroke-dasharray:5 3;}
 .bind{fill:none;stroke:#6f6f6f;stroke-width:1;stroke-dasharray:2 2.4;}
 .band{fill:#efece7;stroke:#161616;stroke-width:1.3;}
 .bar{fill:#161616;}
 .lead{stroke:#b23a3a;stroke-width:0.9;fill:none;}
 .mrk{fill:#161616;stroke:#fcfbf9;stroke-width:1.3;}
 .mlet{fill:#fff;font-size:11px;font-weight:700;text-anchor:middle;}
 .cap{fill:#555;font-size:11.5px;letter-spacing:.16em;}
 .h1{fill:#111;font-size:22px;font-weight:600;}
 .sub{fill:#666;font-size:12px;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .sec{fill:#111;font-size:12px;font-weight:700;letter-spacing:.06em;}
 .klet{fill:#b23a3a;font-size:11px;font-weight:700;}
 .ktit{fill:#111;font-size:11px;font-weight:600;}
 .ktxt{fill:#555;font-size:10px;}
 .mkey{fill:#111;font-size:10.5px;font-weight:600;}
 .lval{fill:#333;font-size:10.5px;}
</style>
<rect x="0" y="0" width="1560" height="1180" fill="#fcfbf9"/>

<!-- ============ HEADER ============ -->
<text x="60" y="48" class="h1">THE CONTOUR SET — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style AW-001 · Gym / Collection 02 · Longline sports bra + high-waist sculpting legging · Base size S · Colourway Graphite · Flat v02 (seamless)</text>
<line x1="60" y1="86" x2="1500" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — drawn to the Contour Set's OWN render: seamless compression knit, second-skin. Support &amp; sculpt shaping are KNIT-IN / bonded, not sewn flatlock panels. Needs a seamless-knit specialist, a workbook (BOM / POM) and a grade before sampling.</text>

<!-- ===================== BRA (top) ===================== -->
<g>
 <!-- FRONT: longline sports bra — shoulder straps, wide shallow scoop, armholes, molded cups, band -->
 <path class="edge" d="M 175 380 C 176 350 182 316 196 300 L 216 300 C 232 334 268 334 284 300 L 304 300 C 318 316 324 350 325 380 L 325 500 L 175 500 L 175 380 Z"/>
 <rect class="band" x="175" y="500" width="150" height="46" rx="2"/>
 <path class="bind" d="M 181 502 L 319 502"/>
 <!-- molded / bonded underbust support — NOT a sewn seam -->
 <path class="bind" d="M 190 438 C 220 468 280 468 310 438"/>
 <text x="250" y="600" text-anchor="middle" class="cap">BRA · FRONT</text>

 <!-- BACK: clean seamless back (racer/scoop TBC), longline band -->
 <path class="edge" d="M 410 380 C 411 350 418 318 434 306 C 452 312 518 312 536 306 C 552 318 559 350 560 380 L 560 500 L 410 500 L 410 380 Z"/>
 <rect class="band" x="410" y="500" width="150" height="46" rx="2"/>
 <path class="bind" d="M 416 502 L 554 502"/>
 <text x="485" y="600" text-anchor="middle" class="cap">BRA · BACK</text>
</g>

<!-- ===================== LEGGING (bottom) ===================== -->
<g>
 <!-- FRONT: smooth second-skin, no sculpt seams -->
