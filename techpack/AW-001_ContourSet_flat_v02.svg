 .cat{fill:#111;font-size:15px;font-weight:700;letter-spacing:.12em;}
 .sub{fill:#666;font-size:11px;}
 .hlabel{fill:#9a9a9a;font-size:9px;font-weight:700;letter-spacing:.07em;}
 .hval{fill:#222;font-size:11px;}
 .gtitle{fill:#111;font-size:15px;font-weight:600;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .sec{fill:#111;font-size:12px;font-weight:700;letter-spacing:.06em;}
 .klet{fill:#b23a3a;font-size:11px;font-weight:700;}
 .ktit{fill:#111;font-size:11px;font-weight:600;}
 .ktxt{fill:#555;font-size:10px;}
 .lval{fill:#333;font-size:10.5px;}
 .tsub{fill:#b23a3a;font-size:10.5px;font-weight:700;letter-spacing:.04em;}
 .trow{fill:#333;font-size:10.5px;}
 .tval{fill:#111;font-size:10.5px;font-weight:700;text-anchor:end;}
 .dim{fill:#b23a3a;font-size:9.5px;}
 .dimln{stroke:#b23a3a;stroke-width:0.7;fill:none;}
</style>
