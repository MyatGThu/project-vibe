<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1020" font-family="Helvetica Neue, Arial, sans-serif">
<style>
 .edge{fill:#fff;stroke:#161616;stroke-width:2.1;stroke-linejoin:round;stroke-linecap:round;}
 .seam{fill:none;stroke:#161616;stroke-width:1.3;}
 .stitch{fill:none;stroke:#161616;stroke-width:1;stroke-dasharray:5 3;}
 .roll{fill:none;stroke:#9a9a9a;stroke-width:1;stroke-dasharray:9 3 2 3;}
 .hem{fill:none;stroke:#a6a6a6;stroke-width:1;stroke-dasharray:3 3;}
 .lead{stroke:#b23a3a;stroke-width:0.9;fill:none;}
 .dot{fill:#b23a3a;} .bar{fill:#161616;} .btn{fill:#161616;}
 .t{fill:#1f1f1f;font-size:11px;} .tb{fill:#111;font-size:11px;font-weight:600;}
 .cap{fill:#555;font-size:12px;letter-spacing:.18em;}
 .h1{fill:#111;font-size:22px;font-weight:600;} .sub{fill:#666;font-size:12px;}
 .note{fill:#444;font-size:10.5px;} .warn{fill:#b23a3a;font-size:11px;font-weight:600;}
 .mkey{fill:#111;font-size:10.5px;font-weight:600;} .mval{fill:#333;font-size:10.5px;}
</style>
<rect x="0" y="0" width="1400" height="1020" fill="#fcfbf9"/>
<text x="60" y="48" class="h1">THE MONOLITH COAT — TECHNICAL FLAT</text>
<text x="60" y="70" class="sub">Style MC-001 · Autumn Capsule 01 · Womenswear double-breasted overcoat · Base size M · Colourway Charcoal · Flat v01</text>
<line x1="60" y1="86" x2="1340" y2="86" stroke="#161616" stroke-width="1"/>
<text x="60" y="106" class="warn">DRAFT — not to scale, not graded. Proportion + detail intent for quote/proto only. Canvassing, lapel roll &amp; grade to be confirmed against the block at first proto (sheet 08).</text>

<!-- ============ FRONT ============ -->
<g>
<!-- sleeves (behind body) -->
<path class="edge" d="M 262 184 C 228 198, 206 260, 200 362 C 197 448, 200 520, 205 566 L 247 560 C 249 470, 252 322, 266 212 Z"/>
<path class="edge" d="M 418 184 C 452 198, 474 260, 480 362 C 483 448, 480 520, 475 566 L 433 560 C 431 470, 428 322, 414 212 Z"/>
<!-- body -->
<path class="edge" d="M 258 178 L 422 178 C 431 300, 432 360, 426 432 C 421 560, 432 700, 440 812 L 240 812 C 248 700, 259 560, 254 432 C 248 360, 249 300, 258 178 Z"/>
<!-- peak lapels + collar -->
<path class="edge" d="M 340 172 L 305 159 L 291 206 L 306 216 L 299 300 L 340 240 Z"/>
<path class="edge" d="M 340 172 L 375 159 L 389 206 L 374 216 L 381 300 L 340 240 Z"/>
<!-- roll line -->
<path class="roll" d="M 306 216 C 316 250, 330 300, 340 300"/>
<path class="roll" d="M 374 216 C 364 250, 350 300, 340 300"/>
<!-- front princess seams -->
<path class="seam" d="M 300 210 C 296 360, 300 560, 306 806"/>
<path class="seam" d="M 380 210 C 384 360, 380 560, 374 806"/>
<!-- double-breasted 6x2 buttons -->
<circle class="btn" cx="314" cy="256" r="3.4"/><circle class="btn" cx="368" cy="256" r="3.4"/>
<circle class="btn" cx="314" cy="326" r="3.4"/><circle class="btn" cx="368" cy="326" r="3.4"/>
<circle class="btn" cx="314" cy="396" r="3.4"/><circle class="btn" cx="368" cy="396" r="3.4"/>
<!-- self belt -->
<rect class="edge" x="250" y="414" width="180" height="22" rx="2"/>
<rect class="seam" x="326" y="416" width="26" height="18" rx="1.5"/>
<!-- welt pockets -->
<path class="seam" d="M 272 512 L 320 520"/>
<path class="seam" d="M 408 512 L 360 520"/>
<rect class="bar" x="269" y="510.5" width="6" height="3"/>
<rect class="bar" x="317" y="518.5" width="6" height="3"/>
<rect class="bar" x="405" y="510.5" width="6" height="3"/>
<rect class="bar" x="357" y="518.5" width="6" height="3"/>
<!-- sleeve cuff buttons -->
<circle class="btn" cx="214" cy="536" r="2.4"/><circle class="btn" cx="222" cy="540" r="2.4"/><circle class="btn" cx="230" cy="544" r="2.4"/>
<circle class="btn" cx="466" cy="536" r="2.4"/><circle class="btn" cx="458" cy="540" r="2.4"/><circle class="btn" cx="450" cy="544" r="2.4"/>
<!-- hem fold -->
<path class="hem" d="M 246 792 L 434 792"/>
<text x="340" y="852" text-anchor="middle" class="cap">FRONT</text>
</g>

<!-- ============ BACK ============ -->
<g>
<path class="edge" d="M 622 184 C 588 198, 566 260, 560 362 C 557 448, 560 520, 565 566 L 607 560 C 609 470, 612 322, 626 212 Z"/>
<path class="edge" d="M 778 184 C 812 198, 834 260, 840 362 C 843 448, 840 520, 835 566 L 793 560 C 791 470, 788 322, 774 212 Z"/>
<path class="edge" d="M 618 178 L 782 178 C 791 300, 792 360, 786 432 C 781 560, 792 700, 800 812 L 600 812 C 608 700, 619 560, 614 432 C 608 360, 609 300, 618 178 Z"/>
<!-- back collar -->
<path class="edge" d="M 664 178 C 682 198, 718 198, 736 178"/>
<!-- centre-back seam -->
<path class="seam" d="M 700 190 L 700 662"/>
<!-- back princess seams -->
<path class="seam" d="M 660 210 C 656 360, 660 560, 666 806"/>
<path class="seam" d="M 740 210 C 744 360, 740 560, 734 806"/>
<!-- half belt -->
<rect class="edge" x="652" y="414" width="96" height="20" rx="2"/>
<circle class="btn" cx="666" cy="424" r="2.8"/><circle class="btn" cx="734" cy="424" r="2.8"/>
<!-- centre-back vent -->
<path class="edge" d="M 700 662 L 700 812"/>
<path class="stitch" d="M 692 664 L 692 806"/>
<!-- hem fold -->
<path class="hem" d="M 606 792 L 794 792"/>
<text x="700" y="852" text-anchor="middle" class="cap">BACK</text>
</g>

<!-- ============ FRONT CALLOUTS (left column) ============ -->
<path class="lead" d="M 306 190 L 222 166"/><circle class="dot" cx="306" cy="190" r="2.2"/>
<text x="215" y="158" text-anchor="end" class="tb">Peak lapel — 11 cm at peak</text>
<text x="215" y="171" text-anchor="end" class="t">felled undercollar; hard-pressed, no shine (D)</text>

<path class="lead" d="M 340 256 L 222 244"/><circle class="dot" cx="340" cy="256" r="2.2"/>
<text x="215" y="240" text-anchor="end" class="tb">Double-breasted 6×2</text>
<text x="215" y="253" text-anchor="end" class="t">16 cm overlap; interior jigger button</text>

<path class="lead" d="M 300 340 L 222 330"/><circle class="dot" cx="300" cy="340" r="2.2"/>
<text x="215" y="326" text-anchor="end" class="tb">Canvassed front</text>
<text x="215" y="339" text-anchor="end" class="t">hair-canvas chest piece; clean lapel roll</text>

<path class="lead" d="M 262 424 L 222 424"/><circle class="dot" cx="262" cy="424" r="2.2"/>
<text x="215" y="420" text-anchor="end" class="tb">Self-belt on loops (B)</text>
<text x="215" y="433" text-anchor="end" class="t">cinches waist; matte buckle</text>

<path class="lead" d="M 296 516 L 222 512"/><circle class="dot" cx="296" cy="516" r="2.2"/>
<text x="215" y="508" text-anchor="end" class="tb">Welt / besom pocket</text>
<text x="215" y="521" text-anchor="end" class="t">at side seam; bartacked ends</text>

<path class="lead" d="M 203 452 L 219 600"/><circle class="dot" cx="203" cy="452" r="2.2"/>
<text x="215" y="604" text-anchor="end" class="tb">Set-in sleeve</text>
<text x="215" y="617" text-anchor="end" class="t">roll-head + shoulder pad; 4 cuff buttons (F)</text>

<path class="lead" d="M 300 792 L 222 700"/><circle class="dot" cx="300" cy="792" r="2.2"/>
<text x="215" y="696" text-anchor="end" class="tb">Hem 4 cm, blind-stitched</text>
<text x="215" y="709" text-anchor="end" class="t">lining dropped with a pleat; sweep = C</text>

<!-- ============ BACK CALLOUTS (right column) ============ -->
<path class="lead" d="M 720 184 L 850 162"/><circle class="dot" cx="720" cy="184" r="2.2"/>
<text x="858" y="158" text-anchor="start" class="tb">Back neck / collar stand</text>
<text x="858" y="171" text-anchor="start" class="t">melton undercollar, felled to roll line</text>

<path class="lead" d="M 700 300 L 850 250"/><circle class="dot" cx="700" cy="300" r="2.2"/>
<text x="858" y="246" text-anchor="start" class="tb">Centre-back seam</text>
<text x="858" y="259" text-anchor="start" class="t">shapes the waist; pressed open</text>

<path class="lead" d="M 748 424 L 850 350"/><circle class="dot" cx="748" cy="424" r="2.2"/>
<text x="858" y="346" text-anchor="start" class="tb">Back half-belt, 2 buttons</text>
<text x="858" y="359" text-anchor="start" class="t">holds the cinch across the back</text>

<path class="lead" d="M 700 720 L 850 470"/><circle class="dot" cx="700" cy="720" r="2.2"/>
<text x="858" y="466" text-anchor="start" class="tb">Centre-back vent — 30 cm (G)</text>
<text x="858" y="479" text-anchor="start" class="t">clean-finished, for stride</text>

<path class="lead" d="M 566 380 L 850 560"/><circle class="dot" cx="566" cy="380" r="2.2"/>
<text x="858" y="556" text-anchor="start" class="tb">Dropped shoulder / oversized</text>
<text x="858" y="569" text-anchor="start" class="t">armhole set low; relaxed through body</text>

<!-- ============ LEGEND ============ -->
<text x="1140" y="150" class="mkey">LEGEND</text>
<line x1="1140" y1="168" x2="1174" y2="168" class="edge"/><text x="1184" y="172" class="mval">cut edge / seam</text>
<line x1="1140" y1="188" x2="1174" y2="188" class="stitch"/><text x="1184" y="192" class="mval">topstitch / edge-stitch</text>
<line x1="1140" y1="208" x2="1174" y2="208" class="roll"/><text x="1184" y="212" class="mval">lapel roll line</text>
<line x1="1140" y1="228" x2="1174" y2="228" class="hem"/><text x="1184" y="232" class="mval">hem fold</text>
<circle class="btn" cx="1157" cy="245" r="3.4"/><text x="1184" y="249" class="mval">button</text>
<rect class="bar" x="1140" y="260" width="10" height="4"/><text x="1184" y="268" class="mval">bartack</text>

<!-- ============ KEY MEASURES ============ -->
<text x="1140" y="308" class="mkey">KEY MEASURES — size M (cm, ½ girths)</text>
<text x="1140" y="330" class="mkey">A · ½ Chest (below armhole)</text><text x="1368" y="330" text-anchor="end" class="mval">58.0</text>
<text x="1140" y="348" class="mkey">B · ½ Waist (at belt)</text><text x="1368" y="348" text-anchor="end" class="mval">52.0</text>
<text x="1140" y="366" class="mkey">C · ½ Sweep (hem)</text><text x="1368" y="366" text-anchor="end" class="mval">66.0</text>
<text x="1140" y="384" class="mkey">D · Shoulder (dropped)</text><text x="1368" y="384" text-anchor="end" class="mval">48.0</text>
<text x="1140" y="402" class="mkey">E · Back length HPS–hem</text><text x="1368" y="402" text-anchor="end" class="mval">112.0</text>
<text x="1140" y="420" class="mkey">F · Sleeve length</text><text x="1368" y="420" text-anchor="end" class="mval">62.0</text>
<text x="1140" y="438" class="mkey">G · Centre-back vent</text><text x="1368" y="438" text-anchor="end" class="mval">30.0</text>
<text x="1140" y="456" class="mkey">H · Armhole (straight)</text><text x="1368" y="456" text-anchor="end" class="mval">27.0</text>
<text x="1140" y="474" class="mkey">½ Cuff opening</text><text x="1368" y="474" text-anchor="end" class="mval">16.0</text>
<text x="1140" y="492" class="mkey">Lapel width at peak</text><text x="1368" y="492" text-anchor="end" class="mval">11.0</text>

<!-- ============ FABRIC / COLOUR ============ -->
<text x="1140" y="532" class="mkey">FABRIC / COLOUR / TRIM</text>
<text x="1140" y="552" class="note">Shell: 100% virgin wool, dry melton / coating</text>
<text x="1140" y="568" class="note">480–520 gsm, low nap · Charcoal, matte, NO shine</text>
<text x="1140" y="584" class="note">≈ Pantone 19-0201 TCX · dye-lot approval req.</text>
<text x="1140" y="600" class="note">Front: hair-canvas chest piece (canvassed)</text>
<text x="1140" y="616" class="note">Lining: cupro / Bemberg twill, tonal charcoal</text>
<text x="1140" y="632" class="note">Buttons: corozo / horn 30L (19 mm) matte, tonal</text>
<text x="1140" y="648" class="note">Belt: self-fabric 5 cm · Thread: tonal Tex 40</text>

<line x1="60" y1="900" x2="1340" y2="900" stroke="#ddd" stroke-width="1"/>
<text x="60" y="928" class="note">Lettered callouts A–H map to the graded Points of Measure table in the tech-pack document (MC-001 techpack, sheet 02).</text>
<text x="60" y="947" class="note">Working vs. non-working cuff buttons: advise cost delta at proto. Buttonholes keyhole — confirm hand vs. machine.</text>
<text x="60" y="966" class="note">Grade rules, seam allowances &amp; true proportions live in the tech-pack workbook. This drawing is the visual key to them, not a substitute.</text>
</svg>
