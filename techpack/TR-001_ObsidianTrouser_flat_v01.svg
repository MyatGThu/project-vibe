<text x="1140" y="520" class="mkey">Fly length</text><text x="1368" y="520" text-anchor="end" class="mval">15.0</text>
<text x="1140" y="558" class="mkey">FABRIC / COLOUR</text>
<text x="1140" y="578" class="note">Wool-blend suiting, matte, mech. stretch</text>
<text x="1140" y="594" class="note">62/34/4 Wool/Poly/Elastane · 250–270 gsm</text>
<text x="1140" y="610" class="note">Obsidian — Pantone 19-4007 TCX, no sheen</text>
<text x="1140" y="626" class="note">Pocketing: Bone (contrast, deliberate)</text>
<text x="60" y="944" class="note">*Belt loops: design intent says clean/concealed, but sheet 06 references a waistband loop for the hangtag — confirm loops vs. no loops before pattern.</text>
<text x="60" y="963" class="note">Grade rules, seam allowances &amp; true proportions live in the workbook (sheets 03 POM, 04 CONSTRUCTION). This drawing is the visual key to them, not a substitute.</text>
